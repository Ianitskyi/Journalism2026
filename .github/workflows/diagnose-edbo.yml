name: Diagnose EDBO data source

# Розвідувальний workflow: запускається лише вручну. Відкриває
# vstup.edbo.gov.ua (поточний рік і архівні vstup<рік>), data.gov.ua й
# promedia.report headless-браузером у середовищі з повним доступом в
# інтернет (на відміну від агентської сесії) і друкує знайдене прямо в лог
# джоба (мережевий лог, текст сторінки, кольори й шрифти CSS) — щоб
# зрозуміти реальний контракт даних і дизайн, перш ніж писати робочий
# scripts/fetch-edbo.mjs чи підправляти css/style.css.
# HTML/скріншоти/тіла відповідей додатково зберігаються як артефакт.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run diagnose-edbo-api
        timeout-minutes: 2
