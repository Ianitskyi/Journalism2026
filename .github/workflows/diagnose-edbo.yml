name: Diagnose EDBO data source

# Розвідувальний workflow: запускається лише вручну. Відкриває
# vstup.edbo.gov.ua й promedia.report headless-браузером у середовищі з
# повним доступом в інтернет (на відміну від агентської сесії) і друкує
# знайдене прямо в лог джоба (мережевий лог, текст сторінки, кольори й
# шрифти CSS) — щоб зрозуміти реальний контракт даних і дизайн, перш ніж
# писати робочий scripts/fetch-edbo.mjs чи підправляти css/style.css.
# HTML/скріншоти/тіла відповідей додатково зберігаються як артефакт.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run diagnose-edbo
      - run: npm run diagnose-promedia
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: edbo-diagnostics
          path: diagnostics/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promedia-diagnostics
          path: diagnostics-promedia/
          retention-days: 14
