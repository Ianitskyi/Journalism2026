name: Diagnose EDBO data source

# Спершу — розвідувальний workflow (Playwright-скрипти в scripts/diagnose-*),
# тепер основне призначення: наповнення data/ реальними історичними даними
# ЄДЕБО через scripts/fetch-edbo-history.mjs (архівні vstup<рік>.edbo.gov.ua,
# 2018–2025 — НЕ захищені Cloudflare, на відміну від живого поточного року,
# перевірено diagnose-edbo-history.mjs). Запускається лише вручну.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run diagnose-edbo-spec-codes
        timeout-minutes: 2
