name: Diagnose EDBO data source

# Розвідувальний workflow: запускається лише вручну. Відкриває
# vstup.edbo.gov.ua headless-браузером у середовищі з повним доступом в
# інтернет (на відміну від агентської сесії) і зберігає мережевий лог,
# HTML і скріншоти як артефакт — щоб зрозуміти реальний контракт даних
# перед тим, як писати робочий scripts/fetch-edbo.mjs.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run diagnose-edbo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: edbo-diagnostics
          path: diagnostics/
          retention-days: 14
