name: Diagnose EDBO enrollment data

# Тимчасовий розвідувальний workflow: чи є в архівному ЄДЕБО дані про
# фактично зарахованих студентів (не лише допущених до конкурсу).
# Нічого не комітить назад, лише пише результат у лог run.
on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/diagnose-edbo-enrollment.mjs
