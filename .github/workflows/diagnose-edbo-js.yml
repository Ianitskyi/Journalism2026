name: Diagnose EDBO search JS (no browser)

# Легкий розвідувальний workflow без Playwright/браузера — просто читає
# вихідний код offers_search_form.js з vstup<рік>.edbo.gov.ua, щоб
# зрозуміти реальний контракт пошуку конкурсних пропозицій (замість
# гадання по UI кліками, яке виявилось ненадійним).
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run diagnose-edbo-fetch-js
