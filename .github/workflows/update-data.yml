name: Update EDBO data

# Заготовка. Наразі запускається лише вручну (workflow_dispatch), поки не
# підтверджено реальний контракт vstup.edbo.gov.ua у scripts/fetch-edbo.mjs.
# Коли скрипт перевірений і працює — розкоментуйте schedule нижче для
# щоденного автооновлення.
on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 21 * * *" # щодня о 00:00 за Києвом (влітку UTC+3)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-edbo.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Оновлення даних ЄДЕБО"
          git push
