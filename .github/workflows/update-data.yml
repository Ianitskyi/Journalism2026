name: Update EDBO data

# Пошук нових пропозицій захищений Turnstile. Розклад можна вмикати лише
# після того, як людина збере повний data/2026-offers.json через ручний capture
# і успішно перевірить кілька запусків scripts/fetch-edbo-current.mjs.
on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 21 * * *" # 00:00 за Києвом у період літнього часу

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-edbo-current.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Оновлення даних ЄДЕБО 2026"
          git push
